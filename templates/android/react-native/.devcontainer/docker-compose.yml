version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VARIANT: ${NODE_VARIANT:-22-bookworm}
        NODE_MAJOR_VERSION: ${NODE_MAJOR_VERSION:-22}
        ANDROID_API_LEVEL: ${ANDROID_API_LEVEL:-34}
        BUILD_TOOLS_VERSION: ${BUILD_TOOLS_VERSION:-34.0.0}
        NDK_VERSION: ${NDK_VERSION:-26.1.10909125}
        CMDLINE_TOOLS_VERSION: ${CMDLINE_TOOLS_VERSION:-7302050_latest}
        __SECURITY_ARGS__

    volumes:
      - ..:/workspace:cached

    command: sleep infinity

    __NETWORK_MODE__
    __NETWORKS_SERVICE__
__NETWORKS_TOP__
