version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        POSTGRES_CLIENT_VERSION: ${POSTGRES_CLIENT_VERSION:-16}
        __SECURITY_ARGS__

    volumes:
      - ..:/workspace:cached

    command: sleep infinity

    __NETWORK_MODE__
    __NETWORKS_SERVICE__
__NETWORKS_TOP__
