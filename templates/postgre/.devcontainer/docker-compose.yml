version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        POSTGRES_CLIENT_VERSION: ${POSTGRES_CLIENT_VERSION:-16}
        __SECURITY_ARGS__

    volumes:
      - ..:/workspace:cached

    command: sleep infinity

    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=developer
      - DB_PASSWORD=developer
      - DB_NAME=devdb

    depends_on:
      - db

    __NETWORK_MODE__
    __NETWORKS_SERVICE__

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: developer
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data:

__NETWORKS_TOP__
