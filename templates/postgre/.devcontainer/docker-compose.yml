version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: developer
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

    __NETWORKS_SERVICE__

volumes:
  db_data:

__NETWORKS_TOP__
